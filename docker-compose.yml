volumes:
    postgres_data:

services:
    postgres:
        image: postgis/postgis:17-3.5
        environment:
            POSTGRES_DB: interactive_map
            POSTGRES_USER: interactive_map
            POSTGRES_PASSWORD: interactive_map
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U interactive_map -d interactive_map",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

